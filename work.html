<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>

    <!-- grid line with 12 column  -->

    <div class="container text-center">
        <div class="row">
            <div class="col-sm-1 bg-warning">
                Column 1
            </div>
            <div class="col-sm-1 bg-danger">
                Column 2
            </div>
            <div class="col-sm-1 bg-primary">
                Column 3
            </div>
            <div class="col-sm-1 bg-secondary">
                Column 4
            </div>
            <div class="col-sm-1 bg-success">
                Column 5
            </div>
            <div class="col-sm-1 bg-info">
                Column 6
            </div>
            <div class="col-sm-1 bg-warning">
                Column 7
            </div>
            <div class="col-sm-1 bg-danger">
                Column 8
            </div>
            <div class="col-sm-1 bg-success">
                Column 9
            </div>
            <div class="col-sm-1 bg-primary">
                Column 10
            </div>
            <div class="col-sm-1 bg-secondary">
                Column 11
            </div>
            <div class="col-sm-1 bg-info">
                Column 12
            </div>
        </div>
    </div>
    <br><br><br>

    <!-- grid line with 6 column  -->

    <div class="container text-center">
        <div class="row">
            <div class="col-md-2 bg-warning">
                Column 1
            </div>
            <div class="col-md-2 bg-danger">
                Column 2
            </div>
            <div class="col-md-2 bg-primary">
                Column 3
            </div>
            <div class="col-md-2 bg-secondary">
                Column 4
            </div>
            <div class="col-md-2 bg-success">
                Column 5
            </div>
            <div class="col-md-2 bg-info">
                Column 6
            </div>
        </div>
    </div>
    <br><br><br>

    <!-- grid line with 3 column  -->

    <div class="container text-center">
        <div class="row">
            <div class="col-lg-4 bg-warning">
                Column 1
            </div>
            <div class="col-lg-4 bg-danger">
                Column 2
            </div>
            <div class="col-lg-4 bg-primary">
                Column 3
            </div>
        </div>
    </div>
    <br><br><br>

    <!-- grid line with 2 column  -->

    <div class="container text-center">
        <div class="row">
            <div class="col-lg-6 bg-warning">
                Column 1
            </div>
            <div class="col-lg-6 bg-danger">
                Column 2
        </div>
    </div>
</body>

</html>
