<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            width: 300px;
            padding: 20px;
            border: 2px solid black;
            margin: 20px;
            box-sizing: border-box;
            box-shadow: 0px 10px 25px;
            border-radius: 20px;
            background-color: rgb(80, 76, 76);
            color: rgb(225, 179, 62);
            transition: 0.6s;
        }

        .card:hover {
            transform: scale(1.1);

        }

        .btn {
            margin: 20px;
            padding: 12px 30px;
            border: none;
            color: rgb(0, 0, 0);
            font-size: 16px;
            border-radius: 25px;
            background: linear-gradient(to right, rgb(196, 159, 9), rgb(50, 46, 46));
            transition: 0.6s;
            width: 80px;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        li {
            display: inline-block;
            padding: 12px 15px;
            background-color: aqua;
        }

    </style>
</head>

<body>
    <div class="card">
        hello World
    </div>

    <div class="btn">
        Click Me
    </div>

    <ul>
        <li>home</li>
        <li>about</li>
        <li>contact</li>
        <li>service</li>
    </ul>

</body>

</html>
