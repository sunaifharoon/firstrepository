<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 150px;
            width: 150px;
            background-color: blanchedalmond;
            border: 2px solid black;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px;

            gap: 20px;
        }

        .nav {
            width: 100vw;
            height: 70px;
            background-color: rgb(109, 100, 100);
            display: flex;
            justify-content: space-between;
            padding: 0px 0px;
        }

        .logo {
            color: aliceblue;
            font-size: 40px;
            display: flex;
            height: 70px;
            align-items: center;

        }

        ul {
            display: flex;
            gap: 50px;
            font-size: larger;
            color: aliceblue;
            height: 70px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="nav">
        <div class="logo">SUNAIF</div>

        <ul>
            <li>contact</li>
            <li>services</li>
            <li>info</li>
            <li>about</li>
        </ul>

    </div>

    <div class="container">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>
</body>

</html>
